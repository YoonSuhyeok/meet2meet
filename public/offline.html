<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>오프라인 상태 - Meet2Meet</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1a1a2e;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, #e9ecff 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, #ffe9ef 0%, transparent 45%),
        var(--bg);
      font-family: "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(26, 26, 46, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2.4vw, 1.8rem);
      line-height: 1.3;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    button,
    a {
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      color: #fff;
    }

    a {
      background: #eef0f7;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>인터넷 연결이 끊겨 있어요</h1>
    <p>
      저장된 화면은 일부 볼 수 있지만 최신 모임 정보 조회와 투표 저장은
      온라인 연결이 필요합니다.
    </p>
    <div class="actions">
      <button type="button" onclick="location.reload()">다시 시도</button>
      <a href="/">홈으로 이동</a>
    </div>
  </main>
</body>
</html>
