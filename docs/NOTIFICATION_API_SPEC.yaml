openapi: 3.0.3
info:
  title: Meet2Meet — Notification API
  version: 0.1.0
  description: |
    알림 도메인 (PushNotification, NotificationSubscription, AttendanceNudge).
    
    **기본 개념:**
    - **PushNotification**: 브라우저 Web Push API로 기기에 전달되는 단건 메시지
    - **NotificationSubscription**: 사용자 계정 × 기기 × 미팅 단위의 구독 상태
    - **AttendanceNudge**: 미응답자에게 보내는 독촉 (자동 1회 + 수동 1회)
    
    **인증**:
    - 로그인 필수
    - HttpOnly 쿠키(`meet2meet_auth`) 또는 Bearer 토큰

servers:
  - url: http://localhost:8080
    description: Go Core API (로컬 개발)
  - url: http://localhost:3000/api
    description: BFF 프록시 경로 (로컬 개발)

tags:
  - name: subscriptions
    description: PushNotification 구독 등록/해지/상태

paths:
  # ── 구독 등록 ──
  /meetings/{meetingId}/push-subscriptions:
    post:
      operationId: registerPushSubscription
      tags: [subscriptions]
      summary: PushNotification 구독 등록
      description: |
        해당 미팅의 PushNotification을 받기 위해 구독을 등록한다.
        
        **요청 조건:**
        - 로그인 완료
        - PWA 설치 완료 (standalone 모드 실행)
        - 알림 권한 허용됨
        
        **응답:**
        - 구독 성공 시 `subscriptionId` 반환
        - 설치/권한 조건 미충족 시 에러와 함께 필요 액션 안내
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MeetingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionRegisterRequest"
            example:
              pushSubscription:
                endpoint: "https://fcm.googleapis.com/fcm/send/..."
                keys:
                  auth: "xxx"
                  p256dh: "yyy"
              deviceId: "device-uuid-1234"
              isStandalone: true
              notificationPermissionStatus: "granted"
      responses:
        "201":
          description: 구독 등록 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionRegisterResponse"
        "400":
          description: 설치/권한 조건 미충족 또는 유효성 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionErrorResponse"
              example:
                error: "installation_required"
                message: "PWA 설치 후 다시 시도해주세요"
                requiredAction: "install"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    # ── 구독 해지 ──
    delete:
      operationId: unregisterPushSubscription
      tags: [subscriptions]
      summary: PushNotification 구독 해지
      description: |
        해당 미팅의 구독을 해지한다.
        해지 즉시(발송 직전 필터)부터 반영된다.
        현재 기기 식별은 `X-Device-Id` 헤더로 전달한다.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MeetingId"
        - $ref: "#/components/parameters/DeviceIdHeader"
      responses:
        "204":
          description: 구독 해지 완료
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    # ── 구독 상태 확인 ──
    get:
      operationId: getPushSubscriptionStatus
      tags: [subscriptions]
      summary: 내 구독 상태 확인 (기기별)
      description: |
        현재 기기에서의 구독 상태를 확인한다.
        - 구독 활성 여부
        - 설치/권한 상태
        - InstallFlag 상태
        - 마지막 재검증 시각
        현재 기기 식별은 `X-Device-Id` 헤더로 전달한다.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MeetingId"
        - $ref: "#/components/parameters/DeviceIdHeader"
      responses:
        "200":
          description: 구독 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 미응답자 독촉 발송 (수동) ──
  /meetings/{meetingId}/attendance-nudges:
    post:
      operationId: sendAttendanceNudge
      tags: [subscriptions]
      summary: 미응답자 독촉 PushNotification 발송 (수동, 호스트만)
      description: |
        hostId가 미팅 주최자일 때만 가능.
        미응답 Participant에게 독촉 푸시를 수동 발송한다.
        
        **정책:**
        - 자동 발송 1회 이후 호스트 수동 1회만 추가 허용
        - 이미 응답한 참여자는 제외
        - 미팅별로 최대 2회(자동 + 수동) 제한
        - AT-LEAST-ONCE 전달 보장
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MeetingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceNudgeSendRequest"
            example:
              messageOverride: "시간이 남았어요! 투표해주세요."
      responses:
        "202":
          description: 발송 대기열 등록 (비동기 처리)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceNudgeSendResponse"
        "400":
          description: |
            유효하지 않은 요청.
            - 호스트 권한 없음
            - 이미 2회 발송 완료
            - 응답자가 모두 응답함
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: meet2meet_auth
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MeetingId:
      name: meetingId
      in: path
      required: true
      schema:
        type: integer
        format: int32
      example: 123456

    DeviceIdHeader:
      name: X-Device-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 64
      description: "현재 기기를 식별하는 ID"
      example: "device-uuid-1234"

  schemas:
    # ── Request ──
    PushSubscriptionRegisterRequest:
      type: object
      required: [pushSubscription, deviceId, isStandalone, notificationPermissionStatus]
      properties:
        pushSubscription:
          type: object
          required: [endpoint, keys]
          description: |
            브라우저에서 ServiceWorkerRegistration.pushManager.subscribe() 결과.
            JSON 형식으로 직렬화된 PushSubscription 객체.
          properties:
            endpoint:
              type: string
              format: uri
              description: "Web Push 수신 엔드포인트 (예: https://fcm.googleapis.com/fcm/send/...)"
            keys:
              type: object
              required: [auth, p256dh]
              properties:
                auth:
                  type: string
                  description: "HMAC 인증 키"
                p256dh:
                  type: string
                  description: "ECDH 공개 키"
        deviceId:
          type: string
          minLength: 8
          maxLength: 64
          description: "기기를 식별하는 일관된 ID (예: UUID 또는 브라우저 생성 ID)"
        isStandalone:
          type: boolean
          description: "현재 PWA standalone 모드로 실행 중인지 여부 (display-mode=standalone)"
        notificationPermissionStatus:
          type: string
          enum: [granted, denied, default]
          description: "Notification.permission 상태"

    AttendanceNudgeSendRequest:
      type: object
      properties:
        messageOverride:
          type: string
          maxLength: 200
          description: "기본 템플릿 대신 사용할 메시지 (선택, 생략 시 기본 템플릿 사용)"

    # ── Response ──
    PushSubscriptionRegisterResponse:
      type: object
      required: [subscriptionId, meetingId, userId, installFlagCreated]
      properties:
        subscriptionId:
          type: string
          description: "생성된 구독 ID"
        meetingId:
          type: integer
          format: int32
        userId:
          type: string
        installFlagCreated:
          type: boolean
          description: "이번 요청에서 InstallFlag가 새로 생성되었는지 (true = 처음 설치 등록, false = 기존 업데이트)"
        registeredAt:
          type: string
          format: date-time

    PushSubscriptionStatus:
      type: object
      properties:
        meetingId:
          type: integer
          format: int32
        userId:
          type: string
        deviceId:
          type: string
        isSubscribed:
          type: boolean
          description: "현재 구독 활성 상태"
        isStandalone:
          type: boolean
          description: "현재 standalone 모드 실행 중"
        notificationPermissionStatus:
          type: string
          enum: [granted, denied, default]
        installFlagStatus:
          type: string
          enum: [active, disabled, expired]
          description: |
            - active: 활성
            - disabled: 클라이언트 재검증 실패로 비활성화됨
            - expired: 30일 미사용 후 자동 만료됨
        pushSubscriptionEndpointStatus:
          type: string
          enum: [active, sending-suppressed, invalid]
          description: |
            - active: 정상 발송 대상
            - sending-suppressed: 영구 발송 실패 후 발송 중단 상태 (자동 복구 대기)
            - invalid: 만료되거나 유효하지 않은 endpoint
        lastVerifiedAt:
          type: string
          format: date-time
          description: "마지막 재검증 시각"
        lastNudgeAt:
          type: string
          format: date-time
          nullable: true
          description: "마지막 AttendanceNudge 발송 시각 (미발송 시 null)"

    AttendanceNudgeSendResponse:
      type: object
      required: [nudgeId, meetingId, targetCount, queuedAt]
      properties:
        nudgeId:
          type: string
          description: "독촉 발송 작업 ID"
        meetingId:
          type: integer
          format: int32
        targetCount:
          type: integer
          description: "독촉 대상 인원 수"
        queuedAt:
          type: string
          format: date-time
          description: "큐 등록 시각"

    # ── Error ──
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: "에러 코드 (예: validation_error, forbidden)"
        message:
          type: string
          description: "사람이 읽을 수 있는 에러 메시지"

    SubscriptionErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            requiredAction:
              type: string
              enum: [install, grant-permission, re-login, refresh-status]
              description: |
                사용자가 취해야 할 다음 액션.
                - install: PWA 설치 필요
                - grant-permission: 알림 권한 허용 필요
                - re-login: 재로그인 필요
                - refresh-status: 상태 새로고침 필요

  responses:
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "unauthorized"
            message: "로그인이 필요합니다"

    Forbidden:
      description: 권한 없음 (호스트만 가능)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "forbidden"
            message: "미팅 주최자만 이 작업을 수행할 수 있습니다"

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "not_found"
            message: "미팅을 찾을 수 없습니다"
