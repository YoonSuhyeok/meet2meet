# =============================================================================
# docker-compose.yml — 개발 환경 구성
# =============================================================================
# docker-compose는 여러 컨테이너를 한 번에 관리하는 도구입니다.
# 지금은 앱 하나지만, 나중에 DB, Redis 등을 추가할 때 유용합니다.
#
# 실행: docker compose up
# 종료: docker compose down
# 재빌드: docker compose up --build
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # 개발 서버 컨테이너
  # -------------------------------------------------------------------------
  app-dev:
    # build.context: Dockerfile이 있는 디렉토리
    # build.target: 멀티스테이지 중 어디까지만 빌드할지 (deps 단계까지만)
    build:
      context: .
      target: deps

    # 컨테이너 안의 작업 디렉토리
    working_dir: /app

    # volumes (볼륨): 호스트 폴더 ↔ 컨테이너 폴더를 연결합니다.
    # 이렇게 하면 호스트에서 코드를 수정하면 컨테이너에도 즉시 반영됩니다!
    # (핫 리로드/HMR이 작동하는 이유)
    volumes:
      - .:/app                          # 소스코드 마운트
      - /app/node_modules               # node_modules는 컨테이너 것을 사용 (호스트와 분리)

    # ports: 호스트포트:컨테이너포트
    # localhost:3000 으로 접속하면 컨테이너의 3000번 포트로 연결됩니다.
    ports:
      - "3000:3000"

    # environment: 컨테이너 안의 환경변수 설정
    environment:
      - NODE_ENV=development

    # command: 컨테이너 시작 시 실행할 명령 (Dockerfile의 CMD 대신 사용)
    command: pnpm dev --host 0.0.0.0

  # -------------------------------------------------------------------------
  # Storybook 컨테이너 (UI 컴포넌트 개발용)
  # -------------------------------------------------------------------------
  storybook:
    build:
      context: .
      target: deps
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "6006:6006"
    environment:
      - NODE_ENV=development
    command: pnpm storybook --host 0.0.0.0
